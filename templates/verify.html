{% extends "layout.html" %}
{% block title %}Verify QR (Scan){% endblock %}

{% block content %}
<div class="row g-4 align-items-center">
    <div class="col-12 col-lg-7">
        <div class="card scanner-card overflow-hidden border-0 shadow-sm bg-white">
            <div class="card-header bg-dark text-white px-4 py-3 border-0">
                <div class="d-flex justify-content-between align-items-center">
                    <h5 class="fw-bold mb-0 text-white"><i class="bi bi-camera me-2"></i> Live Scanner</h5>
                    <span id="scanStatus" class="badge bg-danger rounded-pill px-3">Idle</span>
                </div>
            </div>
            <div class="card-body p-0 position-relative bg-black scanner-video-area" style="min-height: 480px;">
                <!-- Video element for camera stream -->
                <video id="video" autoplay muted playsinline
                       class="w-100 h-100 object-fit-cover" style="min-height: 480px;"></video>
                <!-- Canvas used for frame capture and decoding (kept hidden) -->
                <canvas id="canvas" style="display:none;"></canvas>
                
                <!-- Scanning Overlay -->
                <div class="position-absolute top-50 start-50 translate-middle w-50 h-50 border border-3 border-primary opacity-50 rounded-4 pointer-events-none scanner-overlay" 
                     id="scanOverlay" style="box-shadow: 0 0 0 2000px rgba(0,0,0,0.5);"></div>
            </div>
            <div class="card-footer bg-white border-0 py-4 px-4 text-center">
                <div class="d-flex gap-3 justify-content-center">
                    <button id="startBtn" class="btn btn-primary btn-lg px-5 rounded-pill shadow-sm">
                        <i class="bi bi-play-fill me-1"></i> Start Camera
                    </button>
                    <button id="stopBtn" class="btn btn-outline-danger btn-lg px-5 rounded-pill d-none">
                        <i class="bi bi-stop-fill me-1"></i> Stop
                    </button>
                </div>
                <p class="text-muted small mt-3 mb-0">Use back camera for better focus and detail.</p>
            </div>
        </div>
    </div>

    <div class="col-12 col-lg-5">
        <div class="card h-100 border-0 shadow-sm">
            <div class="card-header bg-white py-3 border-bottom">
                <h5 class="fw-bold mb-0"><i class="bi bi-person-badge-fill me-2 text-primary"></i> Scan Result</h5>
            </div>
            <div id="scanResult" class="card-body p-4 d-flex flex-column align-items-center justify-content-center text-center">
                <div class="display-1 text-muted opacity-25 mb-3"><i class="bi bi-qr-code"></i></div>
                <p class="text-muted mb-0">No attendee scanned yet.<br>Click "Start Camera" to begin.</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
    <script src="/static/js/verify.js"></script>
{% endblock %}
